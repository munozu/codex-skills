# pyproject.toml - Configuration moderne du projet
[build-system]
requires = [\\\"hatchling\\\"]
build-backend = \\\"hatchling.build\\\"

[project]
name = "python-expert"
dynamic = [\\\"version\\\"]
description = \\\"Description du projet\\\"
readme = \\\"README.md\\\"
license = \\\"MIT\\\"
requires-python = \\\">=3.12\\\"
authors = [
    { name = \\\"Votre Nom\\\", email = \\\"email@example.com\\\" },
]
classifiers = [
    \\\"Development Status :: 4 - Beta\\\",
    \\\"Programming Language :: Python :: 3.12\\\",
    \\\"Framework :: FastAPI\\\",
]
dependencies = [
    \\\"fastapi[standard]>=0.115.0\\\",
    \\\"pydantic>=2.9.0\\\",
    \\\"sqlalchemy[asyncio]>=2.0.0\\\",
    \\\"alembic>=1.13.0\\\",
    \\\"redis>=5.0.0\\\",
    \\\"celery[redis]>=5.3.0\\\",
]

[project.optional-dependencies]
dev = [
    \\\"pytest>=8.0.0\\\",
    \\\"pytest-asyncio>=0.23.0\\\",
    \\\"pytest-cov>=4.0.0\\\",
    \\\"ruff>=0.6.0\\\",
    \\\"mypy>=1.11.0\\\",
    \\\"pre-commit>=3.8.0\\\",
]
test = [
    \\\"httpx>=0.27.0\\\",
    \\\"pytest-mock>=3.14.0\\\",
    \\\"factory-boy>=3.3.0\\\",
]
docs = [
    \\\"mkdocs>=1.6.0\\\",
    \\\"mkdocs-material>=9.5.0\\\",
]

[project.urls]
Homepage = \\\"https://github.com/username/mon-projet\\\"
Documentation = \\\"https://mon-projet.readthedocs.io/\\\"
Repository = \\\"https://github.com/username/mon-projet.git\\\"
Issues = \\\"https://github.com/username/mon-projet/issues\\\"

[tool.hatch.version]
path = \\\"src/mon_projet/__init__.py\\\"

[tool.ruff]
target-version = \\\"py312\\\"
line-length = 88
select = [
    \\\"E\\\",  # pycodestyle errors
    \\\"W\\\",  # pycodestyle warnings
    \\\"F\\\",  # pyflakes
    \\\"I\\\",  # isort
    \\\"B\\\",  # flake8-bugbear
    \\\"C4\\\", # flake8-comprehensions
    \\\"UP\\\", # pyupgrade
]
ignore = [
    \\\"E501\\\",  # line too long, handled by black
    \\\"B008\\\",  # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
\\\"__init__.py\\\" = [\\\"F401\\\"]
\\\"tests/**/*\\\" = [\\\"B011\\\"]

[tool.mypy]
python_version = \\\"3.12\\\"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
minversion = \\\"8.0\\\"
addopts = \\\"-ra -q --strict-markers --strict-config\\\"
testpaths = [\\\"tests\\\"]
asyncio_mode = \\\"auto\\\"
markers = [
    \\\"slow: marks tests as slow (deselect with '-m \\\\\\\"not slow\\\\\\\"')\\\",
    \\\"integration: marks tests as integration tests\\\",
    \\\"unit: marks tests as unit tests\\\",
]

[tool.coverage.run]
source = [\\\"src\\\"]
branch = true

[tool.coverage.report]
exclude_lines = [
    \\\"pragma: no cover\\\",
    \\\"def __repr__\\\",
    \\\"if self.debug:\\\",
    \\\"if settings.DEBUG\\\",
    \\\"raise AssertionError\\\",
    \\\"raise NotImplementedError\\\",
    \\\"if 0:\\\",
    \\\"if __name__ == .__main__.:\\\",
    \\\"class .*\\\\\\\\bProtocol\\\\\\\\):\\\",
    \\\"@(abc\\\\\\\\.)?abstractmethod\\\",
]
```

